name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Install frontend dependencies
        run: npm install

      - name: Generate signing keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v \
            -keystore $HOME/.android/frox-release.keystore \
            -alias frox \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass froxsecret \
            -keypass froxsecret \
            -dname "CN=Frox Code, O=Frox, C=US"
          echo "KEYSTORE_PATH=$HOME/.android/frox-release.keystore" >> $GITHUB_ENV
          echo "KEY_ALIAS=frox" >> $GITHUB_ENV
          echo "KEY_PASSWORD=froxsecret" >> $GITHUB_ENV
          echo "STORE_PASSWORD=froxsecret" >> $GITHUB_ENV

      - name: Init Tauri Android project
        run: npx tauri android init

      - name: Inject signing config into Gradle
        run: |
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          # Add signingConfigs block and wire it to release buildType
          cat >> $BUILD_GRADLE << 'GRADLE'

          android.signingConfigs.create("froxRelease") {
              storeFile = file(System.getenv("KEYSTORE_PATH"))
              storePassword = System.getenv("STORE_PASSWORD")
              keyAlias = System.getenv("KEY_ALIAS")
              keyPassword = System.getenv("KEY_PASSWORD")
          }
          android.buildTypes.getByName("release") {
              signingConfig = android.signingConfigs.getByName("froxRelease")
          }
          GRADLE

      - name: Build signed APK
        run: npx tauri android build

      - name: Find APK
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | tee /tmp/apk_paths.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frox-code-v${{ github.run_number }}.apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
          
