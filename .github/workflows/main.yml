name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Verify env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "NDK_HOME=$NDK_HOME"
          ls $ANDROID_HOME/ndk/ || echo "NDK dir missing"

      - name: Install frontend dependencies
        run: npm install

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Frox Code,O=Frox,C=US"

      - name: Init Tauri Android project
        run: npx tauri android init

      - name: Build APK
        run: npx tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frox-code-${{ github.run_number }}.apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
          
